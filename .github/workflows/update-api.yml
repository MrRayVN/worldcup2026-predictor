name: Update Match Data

on:
  schedule:
    - cron: '0 * * * *' # Cập nhật mỗi 1 tiếng (24 requests/ngày) để tiết kiệm token
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch API Data (API-Football)
        env:
          API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          curl -s -H "x-apisports-key: $API_KEY" "https://v3.football.api-sports.io/fixtures?league=1&season=2026" > api-matches.json

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add api-matches.json
          git commit -m "Auto-update match data" || echo "No changes to commit"
          git push
